{% load static %}
{% if user.is_authenticated %}
    <div class="flex items-center md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
        <div class="relative ml-4" x-data="{ userMenuOpen: false }" @keydown.escape.window="userMenuOpen = false">
            <button type="button"
                    class="top-nav-user-button text-sm"
                    :aria-expanded="userMenuOpen ? 'true' : 'false'"
                    @click="userMenuOpen = !userMenuOpen">
                <span class="sr-only">Open user menu</span>
                {% if user.profile_picture_thumbnail %}
                    <img class="w-8 h-8 rounded-full object-cover"
                         src="{{ user.profile_picture_thumbnail.url }}"
                         alt="{{ user.get_full_name|default:user.email }}">
                {% elif user.profile_picture %}
                    <img class="w-8 h-8 rounded-full object-cover"
                         src="{{ user.profile_picture.url }}"
                         alt="{{ user.get_full_name|default:user.email }}">
                {% else %}
                    <span class="avatar-sm">
                        {{ user.first_name|slice:":1"|upper }}{{ user.last_name|slice:":1"|upper }}
                    </span>
                {% endif %}
            </button>
            <!-- Dropdown menu -->
            <div x-show="userMenuOpen"
                 x-cloak
                 @click.outside="userMenuOpen = false"
                 class="top-nav-dropdown">
                <div class="top-nav-dropdown-header">
                    <span class="block text-sm font-semibold text-fg">{{ user.get_full_name }}</span>
                    <span class="block truncate text-sm text-fg-secondary">{{ user.email }}</span>
                </div>
                <ul class="py-2" aria-labelledby="user-menu-button">
                    <li>
                        <a href="{% url "dashboard" %}"
                           class="top-nav-dropdown-link">
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="{% url "account_profile" %}"
                           class="top-nav-dropdown-link">
                            Your Profile
                        </a>
                    </li>
                    <li>
                        <a href="{% url "account_change_password" %}"
                           class="top-nav-dropdown-link">
                            Settings
                        </a>
                    </li>

                    <li>
                        <a href="{% url "account_logout" %}"
                           class="top-nav-dropdown-link">
                            Sign out
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
{% else %}
    <a
            href="{% url "account_login" %}"
            class="top-nav-auth-link mr-2"
    >
        Login
    </a>
    <a
            href="{% url "account_signup" %}"
            class="btn btn-contained btn-primary btn-sm mr-2"
    >
        Sign up
    </a>
{% endif %}

{% load static %}
{% if user.is_authenticated %}
    <div class="flex items-center md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
        <div class="relative ml-4" x-data="{ userMenuOpen: false }" @keydown.escape.window="userMenuOpen = false">
            <button type="button"
                    class="flex items-center gap-x-1 text-sm bg-gray-800 rounded-full focus:ring-4 focus:ring-gray-300 dark:focus:ring-gray-600"
                    :aria-expanded="userMenuOpen ? 'true' : 'false'"
                    @click="userMenuOpen = !userMenuOpen">
                <span class="sr-only">Open user menu</span>
                {% if user.profile_picture_thumbnail %}
                    <img class="w-8 h-8 rounded-full object-cover"
                         src="{{ user.profile_picture_thumbnail.url }}"
                         alt="{{ user.get_full_name|default:user.email }}">
                {% elif user.profile_picture %}
                    <img class="w-8 h-8 rounded-full object-cover"
                         src="{{ user.profile_picture.url }}"
                         alt="{{ user.get_full_name|default:user.email }}">
                {% else %}
                    <span class="w-8 h-8 rounded-full bg-gray-600 text-white flex items-center justify-center text-xs font-semibold">
                        {{ user.first_name|slice:":1"|upper }}{{ user.last_name|slice:":1"|upper }}
                    </span>
                {% endif %}
            </button>
            <!-- Dropdown menu -->
            <div x-show="userMenuOpen"
                 x-cloak
                 @click.outside="userMenuOpen = false"
                 class="z-50 absolute right-0 my-4 text-base list-none bg-white divide-y divide-gray-100 rounded-sm shadow-sm dark:bg-gray-700 dark:divide-gray-600">
                <div class="px-4 py-3">
                    <span class="block text-sm text-gray-900 dark:text-white">{{ user.get_full_name }}</span>
                    <span class="block text-sm  text-gray-500 truncate dark:text-gray-400">{{ user.email }}</span>
                </div>
                <ul class="py-2" aria-labelledby="user-menu-button">
                    <li>
                        <a href="{% url "dashboard" %}"
                           class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-gray-200 dark:hover:text-white">
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="{% url "account_profile" %}"
                           class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-gray-200 dark:hover:text-white">
                            Your Profile
                        </a>
                    </li>
                    <li>
                        <a href="{% url "account_change_password" %}"
                           class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-gray-200 dark:hover:text-white">
                            Settings
                        </a>
                    </li>

                    <li>
                        <a href="{% url "account_logout" %}"
                           class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-gray-200 dark:hover:text-white">
                            Sign out
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
{% else %}
    <a
            href="{% url "account_login" %}"
            class="py-2 px-4 mr-2 text-sm font-medium leading-5 text-white rounded-lg cursor-pointer lg:px-5 lg:py-2 focus:outline-offset-2"
    >
        Login
    </a>
    <a
            href="{% url "account_signup" %}"
            class="py-2 px-4 mr-2 text-sm font-medium leading-5 text-white bg-blue-600 rounded-lg cursor-pointer lg:px-5 lg:py-2 focus:outline-offset-2"
    >
        Sign up
    </a>
{% endif %}

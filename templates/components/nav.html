{% load static %}
<nav class="sticky top-0 z-50 py-2 px-4 leading-6 text-black bg-gray-800 lg:px-6">
    <div
            class="flex flex-wrap justify-between items-center mx-auto max-w-screen-xl text-black"
             x-data="{open: false}"
    >
        <a href="/" class="flex items-center cursor-pointer">
            <img
                    src="{% static "mainapp/speedpy_logo.png" %}"
                    class="block mr-3 max-w-full h-6 align-middle sm:h-8"
                    alt="SpeedPy Logo"
            />
            <span
                    class="self-center text-xl font-semibold leading-7 text-white whitespace-nowrap"
            >SpeedPy</span
            >
        </a>
        <div class="flex items-center lg:order-2">
            <!-- Theme Toggle Button -->
            <button
                    id="theme-toggle"
                    type="button"
                    class="p-2 mr-2 text-gray-400 rounded-lg hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-600"
                    aria-label="Toggle theme"
                    title="Toggle theme"
            >
                <!-- Light Mode Icon (Sun) -->
                <svg data-theme-icon="light" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                    <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"/>
                </svg>
                <!-- Dark Mode Icon (Moon) -->
                <svg data-theme-icon="dark" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                    <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                </svg>
                <!-- Auto Mode Icon (Desktop/Monitor) -->
                <svg data-theme-icon="auto" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                    <path fill-rule="evenodd" d="M3 5a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2h-2.22l.123.489.804.804A1 1 0 0113 18H7a1 1 0 01-.707-1.707l.804-.804L7.22 15H5a2 2 0 01-2-2V5zm5.771 7H5V5h10v7H8.771z" clip-rule="evenodd"/>
                </svg>
            </button>
            {% include "components/nav_auth.html" %}
            <button
                    @click="open = !open"
                    type="button"
                    class="inline-flex items-center p-2 my-0 mr-0 ml-1 text-sm leading-5 text-center text-gray-400 normal-case bg-transparent bg-none rounded-lg cursor-pointer lg:hidden focus:outline-offset-2"
                    aria-controls="mobile-menu-2"
                    aria-expanded="false"
            >
                <span class="border-gray-200 border-solid sr-only">Open main menu</span>
                <svg
                        class="block w-6 h-6 align-middle"
                        fill="currentColor"
                        viewBox="0 0 20 20"
                        xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                            fill-rule="evenodd"
                            d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"
                            clip-rule="evenodd"
                            class=""
                    ></path>
                </svg>
                <svg
                        class="hidden w-6 h-6 align-middle"
                        fill="currentColor"
                        viewBox="0 0 20 20"
                        xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                            fill-rule="evenodd"
                            d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                            clip-rule="evenodd"
                            class=""
                    ></path>
                </svg>
            </button>
        </div>
        <div
                class="justify-between items-center w-full lg:order-1 lg:flex lg:w-auto"
                id="mobile-menu-2"
                :class="open ? '' : 'hidden'"
        >
            <ul
                    class="flex flex-col p-0 mx-0 mt-4 mb-0 font-medium lg:mt-0 lg:flex-row"
                    style="list-style: none;"
            >

                <li
                        class="text-left lg:mr-0 lg:ml-8"
                >
                    <a
                            href="{% url "pricing" %}"
                            class="block py-2 pr-4 pl-3 text-gray-400 border-t-0 border-b border-gray-700 border-solid cursor-pointer lg:border-0 lg:p-0 hover,lg:bg-transparent border-x-0"
                    >Pricing</a>
                </li>
                <li
                        class="text-left lg:mr-0 lg:ml-8"
                >
                    <a
                            href="#"
                            class="block py-2 pr-4 pl-3 text-gray-400 border-t-0 border-b border-gray-700 border-solid cursor-pointer lg:border-0 lg:p-0 hover,lg:bg-transparent border-x-0"
                    >FAQ</a>
                </li>

                <li
                        class="text-left lg:mr-0 lg:ml-8"
                >
                    <a
                            href="{% url "contact" %}"
                            class="block py-2 pr-4 pl-3 text-gray-400 border-t-0 border-b border-gray-700 border-solid cursor-pointer lg:border-0 lg:p-0 hover,lg:bg-transparent border-x-0"
                    >Contact</a>
                </li>
                <li
                        class="text-left lg:mr-0 lg:ml-8"
                >
                    <a
                            href="#"
                            class="block py-2 pr-4 pl-3 text-gray-400 border-t-0 border-b border-gray-700 border-solid cursor-pointer lg:border-0 lg:p-0 hover,lg:bg-transparent border-x-0"
                    >Blog</a>
                </li>
                <li
                        class="text-left lg:mr-0 lg:ml-8"
                >
                    <a
                            href="#"
                            class="block py-2 pr-4 pl-3 text-gray-400 border-t-0 border-b border-gray-700 border-solid cursor-pointer lg:border-0 lg:p-0 hover,lg:bg-transparent border-x-0"
                    >Docs</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

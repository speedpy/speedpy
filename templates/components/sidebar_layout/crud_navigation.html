{% comment %}
Project-specific sidebar nav items. Included inside <ul class="sidebar-nav">,
so each item must be an <li> using the sidebar-link classes to stay aligned
with the Dashboard link, e.g.:

    <li>
        <a href="..." class="sidebar-link {% if ... %}sidebar-link-active{% endif %}">
            <svg class="sidebar-link-icon" aria-hidden="true" ...>...</svg>
            <span>Label</span>
        </a>
    </li>
{% endcomment %}

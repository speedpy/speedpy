<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Inactive</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background-color: #f4f4f4; border-radius: 10px; padding: 30px; margin: 20px 0;">
        <h1 style="color: #B91C1C; margin-top: 0;">Your subscription is now inactive</h1>

        <p style="font-size: 16px;">
            We were unable to restore payment for your
            <strong style="text-transform: capitalize;">{{ plan_key }}</strong> subscription,
            so paid features have been turned off. Your data is safe — resubscribe any time to
            restore access.
        </p>

        {% if site_url %}
        <div style="text-align: center; margin: 30px 0;">
            <a href="{{ site_url }}" style="background-color: #4F46E5; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; display: inline-block; font-weight: bold;">
                Restore your subscription
            </a>
        </div>
        {% endif %}
    </div>
</body>
</html>
